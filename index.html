<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>두바이 여행 도우미 | 초코렌트카</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #C9963A; --gold-light: #E8B84B; --gold-pale: #FDF6E7; --gold-border: #E8C96A;
    --dark: #1A1612; --text: #1A1612; --text-2: #5C4D3C; --text-3: #8C7B68;
    --bg: #FDFAF5; --bg-2: #F5EFE4; --white: #FFFFFF;
    --radius: 16px; --radius-sm: 10px;
    --shadow: 0 4px 24px rgba(0,0,0,0.08); --shadow-lg: 0 8px 40px rgba(0,0,0,0.12);
  }
  html, body { height: 100%; font-family: 'Noto Sans KR', 'Poppins', sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 16px; background-image: radial-gradient(ellipse at 20% 20%, rgba(201,150,58,0.08) 0%, transparent 60%), radial-gradient(ellipse at 80% 80%, rgba(201,150,58,0.06) 0%, transparent 60%); }
  .chat-container { width: 100%; max-width: 480px; height: 92vh; max-height: 780px; background: var(--white); border-radius: 24px; box-shadow: var(--shadow-lg); display: flex; flex-direction: column; overflow: hidden; border: 1px solid rgba(201,150,58,0.15); }
  .chat-header { background: linear-gradient(135deg, #1A1612 0%, #2C2520 50%, #3D2E1E 100%); padding: 18px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; position: relative; overflow: hidden; }
  .chat-header::before { content: ''; position: absolute; top: -30px; right: -30px; width: 120px; height: 120px; background: radial-gradient(circle, rgba(201,150,58,0.2) 0%, transparent 70%); pointer-events: none; }
  .header-avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, var(--gold), var(--gold-light)); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; box-shadow: 0 2px 12px rgba(201,150,58,0.4); }
  .header-info { flex: 1; }
  .header-name { color: #FFFFFF; font-size: 15px; font-weight: 500; letter-spacing: -0.2px; }
  .header-sub { color: rgba(255,255,255,0.5); font-size: 11px; margin-top: 2px; font-weight: 300; }
  .header-status { display: flex; align-items: center; gap: 5px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: 20px; padding: 4px 10px; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #4ADE80; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .status-text { color: rgba(255,255,255,0.7); font-size: 11px; }
  .chat-messages { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 14px; background: var(--bg); scroll-behavior: smooth; }
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--gold-border); border-radius: 2px; }
  .msg-row { display: flex; flex-direction: column; gap: 4px; animation: fadeUp 0.3s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .msg-row.user { align-items: flex-end; }
  .msg-row.bot { align-items: flex-start; }
  .msg-bubble { max-width: 82%; padding: 11px 15px; border-radius: 18px; font-size: 13.5px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
  .msg-row.bot .msg-bubble { background: var(--white); color: var(--text); border: 1px solid rgba(0,0,0,0.07); border-bottom-left-radius: 4px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
  .msg-row.user .msg-bubble { background: linear-gradient(135deg, var(--gold), var(--gold-light)); color: var(--dark); border-bottom-right-radius: 4px; }
  .msg-time { font-size: 10px; color: var(--text-3); padding: 0 4px; }
  .cta-card { max-width: 82%; margin-top: 4px; background: var(--gold-pale); border: 1px solid var(--gold-border); border-radius: var(--radius-sm); padding: 10px 13px; cursor: pointer; transition: all 0.2s; text-decoration: none; display: block; }
  .cta-card:hover { background: #FAF0D0; transform: translateY(-1px); }
  .cta-title { font-size: 12px; font-weight: 500; color: #7A5C00; margin-bottom: 2px; }
  .cta-sub { font-size: 11px; color: #9A7A30; }
  .typing-indicator { display: flex; align-items: center; gap: 4px; padding: 12px 15px; background: var(--white); border: 1px solid rgba(0,0,0,0.07); border-radius: 18px; border-bottom-left-radius: 4px; width: fit-content; }
  .typing-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--gold); animation: typingBounce 1.2s infinite; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingBounce { 0%,60%,100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-6px); opacity: 1; } }
  .quick-area { padding: 10px 16px 6px; background: var(--bg); display: flex; flex-wrap: wrap; gap: 6px; flex-shrink: 0; border-top: 1px solid rgba(0,0,0,0.04); }
  .quick-btn { background: var(--white); border: 1px solid var(--gold-border); border-radius: 20px; padding: 6px 13px; font-size: 12px; color: var(--text-2); cursor: pointer; transition: all 0.15s; font-family: 'Noto Sans KR', sans-serif; white-space: nowrap; }
  .quick-btn:hover { background: var(--gold-pale); color: var(--gold); border-color: var(--gold); }
  .input-area { padding: 12px 16px 16px; background: var(--white); display: flex; gap: 10px; align-items: flex-end; border-top: 1px solid rgba(0,0,0,0.06); flex-shrink: 0; }
  .input-box { flex: 1; background: var(--bg-2); border: 1.5px solid transparent; border-radius: 22px; padding: 10px 16px; font-size: 13.5px; font-family: 'Noto Sans KR', sans-serif; color: var(--text); outline: none; resize: none; max-height: 100px; line-height: 1.5; transition: border-color 0.2s; }
  .input-box::placeholder { color: var(--text-3); }
  .input-box:focus { border-color: var(--gold); background: var(--white); }
  .send-btn { width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(135deg, var(--gold), var(--gold-light)); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; box-shadow: 0 2px 8px rgba(201,150,58,0.35); }
  .send-btn:hover { transform: scale(1.05); }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .send-icon { width: 18px; height: 18px; fill: none; stroke: var(--dark); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .date-divider { text-align: center; font-size: 11px; color: var(--text-3); margin: 4px 0; position: relative; }
  .date-divider::before, .date-divider::after { content: ''; position: absolute; top: 50%; width: 30%; height: 1px; background: rgba(0,0,0,0.08); }
  .date-divider::before { left: 0; }
  .date-divider::after { right: 0; }
</style>
</head>
<body>
<div class="chat-container">
  <div class="chat-header">
    <div class="header-avatar">🌴</div>
    <div class="header-info">
      <div class="header-name">두바이 여행 도우미</div>
      <div class="header-sub">Choco Rent-a-Car Dubai · 초코렌트카</div>
    </div>
    <div class="header-status">
      <div class="status-dot"></div>
      <span class="status-text">온라인</span>
    </div>
  </div>
  <div class="chat-messages" id="messages">
    <div class="date-divider">오늘</div>
    <div class="msg-row bot">
      <div class="msg-bubble">안녕하세요! 👋 두바이 여행 준비 중이신가요?<br><br>관광지, 렌트카, 맛집, 여행 비용, 날씨 등 두바이에 관한 건 뭐든 물어보세요. 영어로 물어보셔도 돼요!<br><br>Hello! Feel free to ask me anything about Dubai travel 😊</div>
      <div class="msg-time">지금</div>
    </div>
  </div>
  <div class="quick-area" id="quickArea">
    <button class="quick-btn" onclick="sendQuick('두바이 처음인데 며칠이 적당해요?')">📅 며칠 여행?</button>
    <button class="quick-btn" onclick="sendQuick('렌트카로 어디 갈 수 있어요?')">🚗 렌트카 추천</button>
    <button class="quick-btn" onclick="sendQuick('사막 투어 추천해줘')">🏜️ 사막 투어</button>
    <button class="quick-btn" onclick="sendQuick('두바이 여행 예산 알려줘')">💰 예산은?</button>
    <button class="quick-btn" onclick="sendQuick('How many days should I spend in Dubai?')">🇬🇧 English</button>
  </div>
  <div class="input-area">
    <textarea class="input-box" id="userInput" placeholder="질문을 입력하세요... / Ask anything about Dubai" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg class="send-icon" viewBox="0 0 24 24">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>
<script>
const WORKER_URL = 'https://choco-api.seongje3463.workers.dev';
let conversationHistory = [];
let isLoading = false;
let isComposing = false;

const SYSTEM_PROMPT = `당신은 두바이 여행 전문 도우미이자 초코렌트카(Choco Rent-a-Car Dubai)의 안내 챗봇입니다.

핵심 역할:
- 두바이 여행에 관한 모든 질문에 친근하고 유용하게 답변
- 관광지, 렌트카, 맛집, 여행 비용, 날씨, 비자, 쇼핑, 사막 투어 등 전반적인 두바이 여행 정보 제공
- 한국어 질문에는 한국어로, 영어 질문에는 영어로 자동 응답

말투 원칙:
- 친근하고 따뜻한 말투 (한국어: ~해요, ~예요 / 영어: casual & friendly)
- 이모지 적절히 활용
- 너무 길지 않게, 핵심 정보 위주로

초코렌트카 안내 (자연스럽게 연결):
- 렌트카가 도움될 상황에서 자연스럽게 언급
- 두바이 현지 한국인 운영, 카니발 하이리무진(Kia Carnival Hi-Limousine) 보유
- 카카오톡: pf.kakao.com/_PIIxfn
- 인스타그램: @chocorent88
- 과도한 홍보는 금지, 정보 제공 후 자연스럽게 1회만 언급

정보 원칙:
- 모르는 정보는 "현장 확인을 추천드려요" 등으로 솔직하게 안내
- 가격 정보는 대략적인 범위로 제시하고 변동 가능함을 명시

응답 형식:
매 답변 마지막에 아래 형식으로 추천 질문 3개 추가.
[SUGGESTIONS]
질문1||질문2||질문3
[/SUGGESTIONS]`;

document.addEventListener('DOMContentLoaded', () => {
  const input = document.getElementById('userInput');
  input.addEventListener('compositionstart', () => { isComposing = true; });
  input.addEventListener('compositionend', () => { isComposing = false; });
});

function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 100) + 'px'; }
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey && !isComposing) { e.preventDefault(); sendMessage(); } }
function now() { return new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }); }

function addMessage(text, type) {
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = `msg-row ${type}`;
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = text;
  row.appendChild(bubble);
  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = now();
  row.appendChild(time);
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function addBotMessage(text, showCta) {
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row bot';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = text;
  row.appendChild(bubble);
  if (showCta) {
    const cta = document.createElement('a');
    cta.className = 'cta-card';
    cta.href = 'https://pf.kakao.com/_PIIxfn';
    cta.target = '_blank';
    cta.innerHTML = '<div class="cta-title">🚗 초코렌트카 문의하기 · Choco Rent-a-Car</div><div class="cta-sub">카카오톡 채널 바로가기 · KakaoTalk Channel</div>';
    row.appendChild(cta);
  }
  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = now();
  row.appendChild(time);
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function addTyping() {
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row bot';
  row.id = 'typing';
  const ind = document.createElement('div');
  ind.className = 'typing-indicator';
  ind.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  row.appendChild(ind);
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }
function sendQuick(text) { updateQuickArea([]); processMessage(text); }

function sendMessage() {
  if (isComposing) return;
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isLoading) return;
  input.value = '';
  input.blur();
  input.focus();
  input.style.height = 'auto';
  updateQuickArea([]);
  processMessage(text);
}

function updateQuickArea(suggestions) {
  const area = document.getElementById('quickArea');
  area.innerHTML = '';
  if (suggestions.length === 0) return;
  suggestions.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'quick-btn';
    btn.textContent = s;
    btn.onclick = () => sendQuick(s);
    area.appendChild(btn);
  });
}

function parseReply(raw) {
  const match = raw.match(/\[SUGGESTIONS\]([\s\S]*?)\[\/SUGGESTIONS\]/);
  if (!match) return { text: raw.trim(), suggestions: [] };
  const text = raw.replace(/\[SUGGESTIONS\][\s\S]*?\[\/SUGGESTIONS\]/, '').trim();
  const suggestions = match[1].trim().split('||').map(s => s.trim()).filter(Boolean);
  return { text, suggestions };
}

async function processMessage(text) {
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  addMessage(text, 'user');
  conversationHistory.push({ role: 'user', content: text });
  addTyping();
  try {
    const response = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });
    const data = await response.json();
    removeTyping();
    if (data.content && data.content[0]) {
      const raw = data.content[0].text;
      const { text: reply, suggestions } = parseReply(raw);
      conversationHistory.push({ role: 'assistant', content: raw });
      const showCta = reply.includes('렌트카') || reply.includes('rent') || reply.includes('car') || conversationHistory.length >= 4;
      addBotMessage(reply, showCta);
      updateQuickArea(suggestions);
    } else {
      addBotMessage('죄송해요, 일시적인 오류가 발생했어요. 다시 시도해주세요 🙏', false);
    }
  } catch (err) {
    removeTyping();
    addBotMessage('연결에 문제가 생겼어요. 잠시 후 다시 시도해주세요 🙏', false);
  }
  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
}
</script>
</body>
</html>
